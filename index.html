<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SahabatCFGF</title>
    <link rel="icon" type="image/png" href="sahabatcfgf.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

    <section id="landing-page" class="landing-cover">
        <div class="glass-box animate__animated animate__zoomIn">
            <img src="sahabatcfgf.png" alt="Logo SahabatCFGF">
            <h1>Sahabat<span>CFGF</span></h1>
            <p>Kebutuhan penting untuk menunjang proses <strong>diet</strong> anak-anak istimewa Ayah-Bunda!</p>
            <div class="landing-btns">
                <button type="button" onclick="openAuth('login')" class="btn-glow">Login</button>
                <button type="button" onclick="openAuth('register')" class="btn-ghost">Daftar</button>
            </div>
        </div>
    </section>

    <div id="auth-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content animate__animated animate__fadeInUp">
            <button class="close-btn" onclick="closeAuth()"><i class="fas fa-times"></i></button>
            
            <div id="form-login" style="display:none;">
                <h2>Selamat Datang!</h2>
                <input type="text" id="log-username" placeholder="Username" class="input-form">
                <input type="password" id="log-password" placeholder="Password" class="input-form">
                <button onclick="doLogin()" class="btn-glow w-100">Masuk</button>
            </div>

            <div id="form-register" style="display:none;">
                <h2>Buat Akun Baru</h2>
                <input type="text" id="reg-nama" placeholder="Nama Lengkap" class="input-form">
                <input type="email" id="reg-email" placeholder="Email Aktif" class="input-form">
                <input type="text" id="reg-nohp" placeholder="Nomor WA/Telepon" class="input-form">
                <input type="text" id="reg-username" placeholder="Username" class="input-form">
                <input type="password" id="reg-password" placeholder="Password" class="input-form">
                <button onclick="doRegister()" class="btn-glow w-100">Daftar Sekarang</button>
            </div>
            
            <div id="form-otp" style="display:none;">
                <h2>Verifikasi Email</h2>
                <p>Masukkan kode OTP yang kami kirimkan ke email Anda.</p>
                <input type="text" id="otp-code" placeholder="Kode OTP 6 Digit" class="input-form" maxlength="6">
                <button onclick="verifyOTP()" class="btn-glow w-100">Verifikasi</button>
            </div>
        </div>
    </div>

    <div id="main-store" style="display:none;">
        <nav class="navbar">
            <div class="container nav-flex">
                <h2 class="logo"><img src="sahabatcfgf.png" alt="Logo">Sahabat<span>CFGF</span></h2>
                <div class="nav-right">
                    <button class="btn-cart" onclick="toggleCart()">
                        <i class="fas fa-shopping-bag"></i> <span id="cart-count">0</span>
                    </button>
                    <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </nav>

        <div class="container store-layout">
            <main class="product-content">
                <div id="product-grid" class="grid"></div>
            </main>
        </div>
    </div>

    <div id="cart-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content animate__animated animate__slideInRight" style="margin-left:auto; height:100vh; border-radius: 20px 0 0 20px;">
            <button class="close-btn" onclick="toggleCart()"><i class="fas fa-times"></i></button>
            <h2>Keranjang Belanja</h2>
            <div id="cart-items" style="max-height: 60vh; overflow-y: auto; margin-bottom: 20px;">
                </div>
            <div class="cart-summary">
                <h3 style="text-align: right;">Total: Rp <span id="cart-total">0</span></h3>
                <button onclick="checkout()" class="btn-glow w-100" style="margin-top: 15px;">Checkout Pesanan</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
